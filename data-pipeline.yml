name: Daily Data Pipeline

on:
  schedule:
    # Run daily at 6 AM AEST (8 PM UTC previous day)
    - cron: '0 20 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Shopify pipeline
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_EMAIL: ${{ secrets.FIREBASE_EMAIL }}
          FIREBASE_PASSWORD: ${{ secrets.FIREBASE_PASSWORD }}
          BRANDS_CONFIG: ${{ secrets.BRANDS_CONFIG }}
        run: node pipeline/fetch-shopify.js

      - name: Run Klaviyo pipeline
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_EMAIL: ${{ secrets.FIREBASE_EMAIL }}
          FIREBASE_PASSWORD: ${{ secrets.FIREBASE_PASSWORD }}
          BRANDS_CONFIG: ${{ secrets.BRANDS_CONFIG }}
        run: node pipeline/fetch-klaviyo.js
