          content += renderMonthExpanded(state.expandedMonth.year, state.expandedMonth.month);
        }
      } else if (state.currentTab === 'weekly') {
        content = renderWeeklyPlanner();
      } else if (state.currentTab === 'critpath') {
        content = renderCriticalPath();
      } else if (state.currentTab === 'simulator') {
        content = renderPromoSimulator();
      } else if (state.currentTab === 'insights') {
        content = renderInsights();
      }

      document.getElementById('app').innerHTML = content;

      // Calculate actuals vs forecasts for stats bar — filtered to selected FY
      var fyMonths = getFYMonths(state.selectedFY);
      var fyKeys = fyMonths.map(function(m) { return m.key; });
      var totalActualOrders = 0;
      var totalFcstOrders = 0;
      var totalActualSpend = 0;
      var totalActualRevenue = 0;
      var totalUnits = 0;
      var totalEmailRev = 0;
      var totalGM = 0;
      var gmWeightedRev = 0;
      fyKeys.forEach(function(k) {
        totalActualOrders += (SHOPIFY_ORDERS[k] || 0);
        totalFcstOrders += (FORECAST_ORDERS[k] || 0);
        totalActualSpend += (META_SPEND[k] || 0) + (GOOGLE_SPEND[k] || 0);
        var sm = SHOPIFY_MONTHLY[k];
        var rev = (sm && sm.rev > 0) ? sm.rev : 0;
        totalActualRevenue += rev;
        totalUnits += (sm && sm.units > 0) ? sm.units : 0;
        // Email revenue
        var emails = KLAVIYO_EMAILS[k] || [];
        emails.forEach(function(e) { totalEmailRev += (e.rev || 0); });
        // GM weighted
        var mm = getMarginData(k);
        if (mm.gm !== null && rev > 0) {
          gmWeightedRev += rev;
          totalGM += rev * (mm.gm / 100);
        }
      });
      var ordersVar = getVariance(totalActualOrders, totalFcstOrders);
      var ordVarSign = ordersVar >= 0 ? '+' : '';
      var ordVarColor = ordersVar >= 0 ? '#059669' : '#DC2626';
      var avgCAC = totalActualSpend / Math.max(totalActualOrders, 1);
      var roas = totalActualRevenue / Math.max(totalActualSpend, 1);
      var aov = totalActualRevenue / Math.max(totalActualOrders, 1);
      var upo = totalUnits / Math.max(totalActualOrders, 1);
      var gmPct = gmWeightedRev > 0 ? (totalGM / gmWeightedRev * 100) : null;
      var gmDollars = totalGM;
      var gmRoas = totalGM / Math.max(totalActualSpend, 1);
      var emailPct = totalActualRevenue > 0 ? (totalEmailRev / totalActualRevenue * 100) : 0;

      var sb = '';
      // Primary row — big hero metrics
      sb += '<div class="stats-row stats-row-primary">';
      sb += '<div class="stat-card stat-card-primary"><div class="stat-label">Total Revenue</div><div class="stat-value">' + formatCurrency(totalActualRevenue) + '</div><div class="stat-sub">Forecast: ' + formatCurrency(totalFcstOrders * AOV) + '</div></div>';
      sb += '<div class="stat-card stat-card-primary"><div class="stat-label">Orders</div><div class="stat-value">' + totalActualOrders.toLocaleString() + '</div><div class="stat-sub">Forecast: ' + totalFcstOrders.toLocaleString() + ' <span style="color:' + ordVarColor + '; font-weight:700;">' + ordVarSign + ordersVar.toFixed(1) + '%</span></div></div>';
      sb += '<div class="stat-card stat-card-primary"><div class="stat-label">Units Sold</div><div class="stat-value">' + totalUnits.toLocaleString() + '</div><div class="stat-sub">UPO: ' + upo.toFixed(1) + '</div></div>';
      sb += '<div class="stat-card stat-card-primary"><div class="stat-label">AOV</div><div class="stat-value">' + formatCurrency(aov) + '</div></div>';
      sb += '<div class="stat-card stat-card-primary"><div class="stat-label">GM$</div><div class="stat-value" style="color:#059669;">' + formatCurrency(gmDollars) + '</div>' + (gmPct !== null ? '<div class="stat-sub">GM%: ' + gmPct.toFixed(1) + '%</div>' : '') + '</div>';
      sb += '</div>';

      // Secondary row — performance detail
      var mktPct = totalActualRevenue > 0 ? (totalActualSpend / totalActualRevenue * 100) : 0;
      var mktColor = mktPct <= 25 ? '#059669' : mktPct <= 35 ? '#D97706' : '#DC2626';
      sb += '<div class="stats-row stats-row-secondary">';
      sb += '<div class="stat-card stat-card-highlight"><div class="stat-label">ROAS (Revenue)</div><div class="stat-value" style="color:#059669;">' + roas.toFixed(2) + 'x</div></div>';
      sb += '<div class="stat-card stat-card-accent"><div class="stat-label">ROAS (GM$)</div><div class="stat-value" style="color:#7c3aed;">' + gmRoas.toFixed(2) + 'x</div></div>';
      sb += '<div class="stat-card stat-card-secondary"><div class="stat-label">Ad Spend</div><div class="stat-value">' + formatCurrency(totalActualSpend) + '</div><div class="stat-sub" style="color:' + mktColor + ';font-weight:700;">' + mktPct.toFixed(1) + '% of sales</div></div>';
      sb += '<div class="stat-card stat-card-secondary"><div class="stat-label">Avg CAC</div><div class="stat-value">' + formatCurrency(avgCAC) + '</div></div>';
      sb += '<div class="stat-card stat-card-warn"><div class="stat-label">Email Revenue</div><div class="stat-value">' + formatCurrency(totalEmailRev) + '</div><div class="stat-sub">' + emailPct.toFixed(1) + '% of total</div></div>';
      sb += '<div class="stat-card stat-card-secondary"><div class="stat-label">Forecast Orders</div><div class="stat-value">' + totalFcstOrders.toLocaleString() + '</div></div>';
      sb += '<div class="stat-card stat-card-secondary"><div class="stat-label">Orders Variance</div><div class="stat-value" style="color:' + ordVarColor + ';">' + ordVarSign + ordersVar.toFixed(1) + '%</div></div>';
      sb += '</div>';

      document.getElementById('stats-bar').innerHTML = sb;
    }

    // ============================================================================
    // EVENT HANDLERS
    // ============================================================================

    function switchTab(tab) {
      state.currentTab = tab;
      state.expandedMonth = null;

      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

      render();
    }

    function expandMonth(month, year) {
      if (state.expandedMonth && state.expandedMonth.month === month && state.expandedMonth.year === year) {
        state.expandedMonth = null;
      } else {
        state.expandedMonth = {month, year};
      }
      render();
    }

    function fmtDate(d) {
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function setMonthEmail(key, value) {
      state.monthEmails[key] = value;
    }

    // === EMAIL CONFIG FUNCTIONS ===
    function addEmailSlot(monthKey, weekIdx) {
      var wk = state.emailConfig[monthKey][weekIdx];
      if (wk.emails.length >= 5) return;
      // Default to next day after last email in the week
      var lastDate = new Date(wk.emails[wk.emails.length - 1].date);
      var newDate = new Date(lastDate);
      newDate.setDate(newDate.getDate() + 1);
      // Skip weekends
      if (newDate.getDay() === 0) newDate.setDate(newDate.getDate() + 1);
      if (newDate.getDay() === 6) newDate.setDate(newDate.getDate() + 2);
      var typeOpts = ["🏷️ Promo","✨ New In","🔥 Best Sellers","📖 Brand Story","⚡ Flash Sale"];
      wk.emails.push({ date: fmtDate(newDate), type: typeOpts[wk.emails.length % typeOpts.length] });
      render();
    }

    function removeEmailSlot(monthKey, weekIdx, emailIdx) {
      var wk = state.emailConfig[monthKey][weekIdx];
      if (wk.emails.length <= 1) return;
      if (!confirm('Remove this email from Week ' + (weekIdx + 1) + '? This cannot be undone.')) return;
      wk.emails.splice(emailIdx, 1);
      render();
    }

    function updateEmailDate(monthKey, weekIdx, emailIdx, value) {
      state.emailConfig[monthKey][weekIdx].emails[emailIdx].date = value;
    }

    function updateEmailType(monthKey, weekIdx, emailIdx, value) {
      state.emailConfig[monthKey][weekIdx].emails[emailIdx].type = value;
    }

    // === KEY EVENT EDIT FUNCTIONS ===
    function openEditKeyEvent(origName, monthKey) {
      var event = AU_KEY_EVENTS.find(function(e) { return e.name === origName; });
      if (!event) return;
      var ovr = (state.promoOverrides || {})[origName] || {};
      var overlay = document.createElement('div');
      overlay.id = 'promo-modal-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';
      var modal = '<div style="background:#fff;border-radius:12px;padding:28px;width:480px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.2);">';
      modal += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">';
      modal += '<h3 style="color:#1B365D;margin:0;">Edit: ' + event.icon + ' ' + event.name + '</h3>';
      modal += '<button onclick="closeAddPromo()" style="background:none;border:none;font-size:18px;cursor:pointer;">✕</button></div>';
      modal += '<div style="display:flex;flex-direction:column;gap:12px;">';
      modal += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Type</label>';
      modal += '<select id="ke-type" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;">';
      ['sale','campaign','flash','event'].forEach(function(t) {
        modal += '<option value="' + t + '"' + ((ovr.type || event.type) === t ? ' selected' : '') + '>' + t.charAt(0).toUpperCase() + t.slice(1) + '</option>';
      });
      modal += '</select></div>';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Discount</label>';
      modal += '<input type="text" id="ke-discount" value="' + (ovr.discount !== undefined ? ovr.discount : (event.discount || '')) + '" placeholder="e.g. 30% off" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div></div>';
      modal += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Start Date</label>';
      modal += '<input type="date" id="ke-start" value="' + (ovr.start || event.start) + '" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div>';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">End Date</label>';
      modal += '<input type="date" id="ke-end" value="' + (ovr.end || event.end) + '" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div></div>';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Notes</label>';
      modal += '<input type="text" id="ke-notes" value="' + (ovr.notes !== undefined ? ovr.notes : (event.notes || '')) + '" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div>';
      modal += '<div style="display:flex;gap:8px;">';
      modal += '<button onclick="saveKeyEventEdit(\'' + origName.replace(/'/g, "\\'") + '\')" style="flex:1;padding:10px;background:#1B365D;color:#fff;border:none;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;">Save Changes</button>';
      modal += '<button onclick="resetKeyEventEdit(\'' + origName.replace(/'/g, "\\'") + '\')" style="padding:10px 16px;background:#fff;color:#666;border:1px solid #ddd;border-radius:6px;font-size:13px;cursor:pointer;">Reset</button>';
      modal += '</div></div></div>';
      overlay.innerHTML = modal;
      document.body.appendChild(overlay);
    }

    function saveKeyEventEdit(origName) {
      if (!state.promoOverrides) state.promoOverrides = {};
      state.promoOverrides[origName] = {
        type: document.getElementById('ke-type').value,
        discount: document.getElementById('ke-discount').value,
        start: document.getElementById('ke-start').value,
        end: document.getElementById('ke-end').value,
        notes: document.getElementById('ke-notes').value
      };
      closeAddPromo();
      render();
    }

    function resetKeyEventEdit(origName) {
      if (state.promoOverrides) delete state.promoOverrides[origName];
      closeAddPromo();
      render();
    }

    // === CUSTOM PROMO EDIT FUNCTION ===
    function openEditCustomPromo(monthKey, idx) {
      var cp = state.customPromos[monthKey][idx];
      if (!cp) return;
      var overlay = document.createElement('div');
      overlay.id = 'promo-modal-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';
      var modal = '<div style="background:#fff;border-radius:12px;padding:28px;width:440px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.2);">';
      modal += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">';
      modal += '<h3 style="color:#E65100;margin:0;">Edit Custom Promotion</h3>';
      modal += '<button onclick="closeAddPromo()" style="background:none;border:none;font-size:18px;cursor:pointer;">✕</button></div>';
      modal += '<div style="display:flex;flex-direction:column;gap:12px;">';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Promotion Name</label>';
      modal += '<input type="text" id="cp-name" value="' + cp.name.replace(/"/g, '&quot;') + '" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div>';
      modal += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Type</label>';
      modal += '<select id="cp-type" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;"><option value="sale"' + (cp.type==='sale'?' selected':'') + '>🏷️ Sale</option><option value="campaign"' + (cp.type==='campaign'?' selected':'') + '>📢 Campaign</option><option value="flash"' + (cp.type==='flash'?' selected':'') + '>⚡ Flash Sale</option></select></div>';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Discount</label>';
      modal += '<input type="text" id="cp-discount" value="' + (cp.discount || '') + '" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div></div>';
      modal += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Start Date</label>';
      modal += '<input type="date" id="cp-start" value="' + cp.start + '" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div>';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">End Date</label>';
      modal += '<input type="date" id="cp-end" value="' + cp.end + '" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div></div>';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Notes</label>';
      modal += '<input type="text" id="cp-notes" value="' + (cp.notes || '') + '" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div>';
      modal += '<button onclick="saveEditCustomPromo(\'' + monthKey + '\',' + idx + ')" style="width:100%;padding:10px;background:#E65100;color:#fff;border:none;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;margin-top:4px;">Save Changes</button>';
      modal += '</div></div>';
      overlay.innerHTML = modal;
      document.body.appendChild(overlay);
    }

    function saveEditCustomPromo(monthKey, idx) {
      state.customPromos[monthKey][idx] = {
        name: document.getElementById('cp-name').value,
        type: document.getElementById('cp-type').value,
        discount: document.getElementById('cp-discount').value,
        start: document.getElementById('cp-start').value,
        end: document.getElementById('cp-end').value,
        notes: document.getElementById('cp-notes').value
      };
      closeAddPromo();
      render();
    }

    function openAddPromo(monthKey) {
      var overlay = document.createElement('div');
      overlay.id = 'promo-modal-overlay';
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';
      var modal = '<div style="background:#fff;border-radius:12px;padding:28px;width:440px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.2);">';
      modal += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">';
      modal += '<h3 style="color:#1B365D;margin:0;">Add Promotion</h3>';
      modal += '<button onclick="closeAddPromo()" style="background:none;border:none;font-size:18px;cursor:pointer;">✕</button></div>';
      modal += '<div style="display:flex;flex-direction:column;gap:12px;">';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Promotion Name</label>';
      modal += '<input type="text" id="cp-name" placeholder="e.g. Easter Weekend 30% Off" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div>';
      modal += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Type</label>';
      modal += '<select id="cp-type" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;"><option value="sale">🏷️ Sale</option><option value="campaign">📢 Campaign</option><option value="flash">⚡ Flash Sale</option></select></div>';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Discount</label>';
      modal += '<input type="text" id="cp-discount" placeholder="e.g. 30% off" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div></div>';
      modal += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Start Date</label>';
      modal += '<input type="date" id="cp-start" value="' + monthKey + '-01" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div>';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">End Date</label>';
      modal += '<input type="date" id="cp-end" value="' + monthKey + '-14" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div></div>';
      modal += '<div><label style="font-size:12px;font-weight:600;color:#666;display:block;margin-bottom:4px;">Notes</label>';
      modal += '<input type="text" id="cp-notes" placeholder="Optional notes" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;"></div>';
      modal += '<button onclick="saveCustomPromo(\'' + monthKey + '\')" style="width:100%;padding:10px;background:#1B365D;color:#fff;border:none;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;margin-top:4px;">Save Promotion</button>';
      modal += '</div></div>';
      overlay.innerHTML = modal;
      document.body.appendChild(overlay);
    }

    function closeAddPromo() {
      var el = document.getElementById('promo-modal-overlay');
      if (el) el.remove();
    }

    function saveCustomPromo(monthKey) {
      var name = document.getElementById('cp-name').value;
      var type = document.getElementById('cp-type').value;
      var discount = document.getElementById('cp-discount').value;
      var start = document.getElementById('cp-start').value;
      var end = document.getElementById('cp-end').value;
      var notes = document.getElementById('cp-notes').value;
      if (!name) { alert('Please enter a promotion name'); return; }
      if (!state.customPromos[monthKey]) state.customPromos[monthKey] = [];
      state.customPromos[monthKey].push({name: name, type: type, discount: discount, start: start, end: end, notes: notes});
      closeAddPromo();
      render();
    }

    function deleteCustomPromo(monthKey, idx) {
      var name = state.customPromos[monthKey][idx].name;
      if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
      state.customPromos[monthKey].splice(idx, 1);
      render();
    }

    function getMarginData(monthKey) {
      var ovr = (state.marginOverrides || {})[monthKey];
      var baked = MONTH_MARGIN[monthKey];
      return {
        gm: (ovr && ovr.gm !== undefined) ? ovr.gm : (baked ? baked.gm : null),
        md: (ovr && ovr.md !== undefined) ? ovr.md : (baked ? baked.md : null)
      };
    }

    function saveMarginField(monthKey, field, value) {
      if (!state.marginOverrides) state.marginOverrides = {};
      if (!state.marginOverrides[monthKey]) state.marginOverrides[monthKey] = {};
      var num = parseFloat(value);
      state.marginOverrides[monthKey][field] = isNaN(num) ? null : num;
      // No re-render needed — input retains value
    }

    function saveMonthNote(monthKey, value) {
      if (!state.monthNotes) state.monthNotes = {};
      state.monthNotes[monthKey] = value;
      // No re-render needed — textarea retains value
    }

    function updateSimulator(key, value) {
      state.simulatorInputs[key] = value;
      render();
    }

    function runSimulation() {
      render();
    }

    // ============================================================================
    // INIT
    // ============================================================================

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        switchTab(e.target.getAttribute('data-tab'));
      });
    });

    // Restore UI from loaded state
    var sel = document.getElementById('fy-select');
    if (sel) sel.value = state.selectedFY;
    document.getElementById('fy-subtitle').textContent = FY_DEFS[state.selectedFY].label;
    // Restore active tab
    document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});
    var activeTabBtn = document.querySelector('[data-tab="' + state.currentTab + '"]');
    if (activeTabBtn) activeTabBtn.classList.add('active');
    render();
  </script>
</body>
</html>
